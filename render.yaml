services:
  - type: web
    name: naver-news-mailer
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4173
      - key: DATA_DIR
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: GMAIL_CLIENT_ID
        sync: false
      - key: GMAIL_CLIENT_SECRET
        sync: false
      - key: GMAIL_REFRESH_TOKEN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: NAVER_TLS_REJECT_UNAUTHORIZED
        value: 1
