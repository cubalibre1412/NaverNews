services:
  - type: web
    name: naver-news-mailer
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 4173
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: NAVER_TLS_REJECT_UNAUTHORIZED
        value: 1
